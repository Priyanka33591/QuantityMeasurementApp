# =======================
# APPLICATION NAME
# =======================
spring.application.name=quantity-measurement-app

# =======================
# MYSQL DATABASE CONFIGURATION
# =======================

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

#for local host
#spring.datasource.url=jdbc:mysql://localhost:3306/quantity_db
#spring.datasource.username=
#spring.datasource.password=


spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true
spring.datasource.hikari.data-source-properties.verifyServerCertificate=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =======================
# JPA / HIBERNATE CONFIGURATION
# =======================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# =======================
# SWAGGER (OpenAPI) CONFIGURATION
# =======================

springdoc.swagger-ui.path=/quantity-measurement-app


# =======================
# SPRING BOOT ACTUATOR CONFIGURATION
# =======================

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always


# =======================
# JWT CONFIG
# =======================

jwt.secret=PriyankaSuperSecretKey@2026#SecureJWTKey
jwt.expiration=86400000


# ===============================
# GOOGLE OAUTH2 CONFIG
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile


#this is for deploy
spring.security.oauth2.client.registration.google.redirect-uri=https://quantitymeasurementapp-production-6e3a.up.railway.app/login/oauth2/code/google

#for local host
#spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google


# ===============================
# FRONTEND URLs (React) deploy
# ===============================
app.oauth2.frontend-redirect=https://quantity-measurement-app-frontend-blush.vercel.app/auth/callback
app.oauth2.frontend-login-url=https://quantity-measurement-app-frontend-blush.vercel.app/login


